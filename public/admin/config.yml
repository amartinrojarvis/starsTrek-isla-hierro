backend:
  name: github
  repo: amartinrojarvis/starsTrek-isla-hierro
  branch: main
  base_url: https://starstrek-web.vercel.app
  auth_endpoint: api/auth

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "ponentes"
    label: "Ponentes"
    folder: "src/content/ponentes"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "nombre", widget: "string" }
      - { label: "Rol", name: "rol", widget: "string" }
      - { label: "Foto de retrato", name: "fotoRetrato", widget: "image", required: false }
      - { label: "Biografía", name: "bio", widget: "text" }
      - { label: "Instagram", name: "instagram", widget: "string", required: false }
      - { label: "Web", name: "web", widget: "string", required: false }
      - { label: "Orden", name: "orden", widget: "number", default: 99 }
      - label: "Galería"
        name: "galeria"
        widget: "list"
        required: false
        fields:
          - { label: "Imagen", name: "url", widget: "image" }
          - { label: "Título", name: "titulo", widget: "string", required: false }
      - { label: "Contenido extendido", name: "body", widget: "markdown", required: false }

  - name: "programa"
    label: "Programa"
    folder: "src/content/programa"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Día", name: "dia", widget: "string" }
      - { label: "Fecha", name: "fecha", widget: "string" }
      - label: "Horarios"
        name: "horarios"
        widget: "list"
        fields:
          - { label: "Hora", name: "hora", widget: "string" }
          - { label: "Tipo", name: "tipo", widget: "select", options: ["apertura", "inauguracion", "ponencia", "break", "taller", "clausura", "actividad"] }
          - { label: "Título", name: "titulo", widget: "string" }
          - { label: "Ponente", name: "ponente", widget: "string", required: false }
          - { label: "Descripción", name: "descripcion", widget: "text", required: false }
          - { label: "Destacado", name: "destacado", widget: "boolean", default: false }
      - { label: "Contenido", name: "body", widget: "markdown", required: false }

  - name: "talleres"
    label: "Talleres"
    folder: "src/content/talleres"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "titulo", widget: "string" }
      - { label: "Instructor", name: "instructor", widget: "string" }
      - { label: "Fecha", name: "fecha", widget: "string" }
      - { label: "Hora", name: "hora", widget: "string" }
      - { label: "Duración", name: "duracion", widget: "string" }
      - { label: "Aforo", name: "aforo", widget: "string" }
      - { label: "Descripción", name: "descripcion", widget: "text" }
      - label: "Requisitos"
        name: "requisitos"
        widget: "list"
        required: false
        field: { label: "Requisito", name: "requisito", widget: "string" }
      - { label: "Destacado", name: "destacado", widget: "boolean", default: false }
      - { label: "Contenido", name: "body", widget: "markdown", required: false }
